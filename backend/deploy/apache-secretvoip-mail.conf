# /etc/apache2/sites-available/secretvoip-mail.conf
#
# Serves https://secretvoip.com/mail/  (static SPA from /var/www/secretvoip-mail-pro/dist)
# Proxies  https://secretvoip.com/mail/api/  ->  http://127.0.0.1:4000/api/
#
# Enable modules first:
#   a2enmod ssl proxy proxy_http headers rewrite

<VirtualHost *:443>
    ServerName secretvoip.com
    ServerAlias www.secretvoip.com

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/secretvoip.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/secretvoip.com/privkey.pem

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ---- API reverse proxy (must come BEFORE the Alias) ----
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 120

    ProxyPass        /mail/api/  http://127.0.0.1:4000/api/
    ProxyPassReverse /mail/api/  http://127.0.0.1:4000/api/

    # ---- Static SPA under /mail/ ----
    Alias /mail/ /var/www/secretvoip-mail-pro/dist/

    <Directory /var/www/secretvoip-mail-pro/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /mail/

        # never rewrite the API
        RewriteRule ^api/ - [L]

        # serve real files / dirs as-is (assets/, favicon, etc.)
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        # SPA fallback -> index.html
        RewriteRule ^ /mail/index.html [L]
    </Directory>

    # cache hashed assets aggressively
    <Directory /var/www/secretvoip-mail-pro/dist/assets>
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/secretvoip-mail-error.log
    CustomLog ${APACHE_LOG_DIR}/secretvoip-mail-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName secretvoip.com
    ServerAlias www.secretvoip.com
    Redirect permanent / https://secretvoip.com/
</VirtualHost>
